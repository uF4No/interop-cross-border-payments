name: zksync-prividium-multichain

x-setup-env: &setup-env
  DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
  DEPLOYER_ADDRESS: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  DEPOSIT_AMOUNT: "1000000000000000000000"

x-permissions-api-env: &permissions-api-env
  PORT: 8000
  METRICS_PORT: 9091
  AUTH_METHODS: oidc,crypto_native
  NODE_ENV: production
  OIDC_JWKS_URI: http://keycloak:8080/realms/prividium/protocol/openid-connect/certs
  OIDC_JWT_AUD: prividium-client
  OIDC_JWT_ISSUER: http://localhost:5080/realms/prividium
  OIDC_ADMIN_SUBS: 00000000-0000-0000-0000-000000000001
  CORS_CACHE_DURATION_MS: 600000
  WALLETS_API_ENABLED: "true"
  WEBAUTHN_RP_NAME: ZKsync Prividium
  WEBAUTHN_RP_ID: localhost
  WEBAUTHN_REQUIRE_USER_VERIFICATION: "false"

x-user-panel-env: &user-panel-env
  VITE_OIDC_AUTHORITY: http://localhost:5080/realms/prividium
  VITE_OIDC_CLIENT_ID: prividium-client
  VITE_OIDC_BUTTON_TEXT: Sign in with Keycloak
  VITE_AUTH_METHODS: oidc,crypto_native
  VITE_WALLETS_ENABLED: "true"
  VITE_BRIDGING_ENABLED: "true"
  VITE_L1_RPC_URL: http://localhost:5010
  VITE_L1_CHAIN_ID: 31337
  VITE_L1_CHAIN_NAME: Anvil Localhost
  VITE_REOWN_PROJECT_ID: ""
  PORT: 3000

x-block-explorer-api-env: &block-explorer-api-env
  LOG_LEVEL: verbose
  NODE_ENV: development
  DATABASE_HOST: postgres
  DATABASE_USER: postgres
  DATABASE_PASSWORD: postgres
  DATABASE_ENABLE_SSL: "false"
  NETWORK_NAME: testnet
  PRIVIDIUM: "true"
  PRIVIDIUM_SESSION_SECRET: QkxPQ0tfRVhQTE9SRVJfU0VTU0lPTl9TRUNSRVQ=
  PRIVIDIUM_SESSION_MAX_AGE: 86400000
  PRIVIDIUM_SESSION_SAME_SITE: strict
  LIMITED_PAGINATION_MAX_ITEMS: "10000"
  API_LIMITED_PAGINATION_MAX_ITEMS: "1000"
  DISABLE_BFF_API_SCHEMA_DOCS: "true"

x-block-explorer-worker-env: &block-explorer-worker-env
  DATABASE_HOST: postgres
  DATABASE_USER: postgres
  DATABASE_PASSWORD: postgres
  DATABASE_ENABLE_SSL: "false"
  NETWORK_NAME: testnet
  PRIVIDIUM: "true"
  ENABLE_TOKEN_OFFCHAIN_DATA_SAVER: "true"
  BLOCKS_PROCESSING_BATCH_SIZE: "10"
  NUMBER_OF_BLOCKS_PER_DB_TRANSACTION: "10"

x-block-explorer-data-fetcher-env: &block-explorer-data-fetcher-env
  NETWORK_NAME: testnet
  PRIVIDIUM: "true"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    entrypoint: |
      bash -c "
      cat > /docker-entrypoint-initdb.d/init.sql << 'SQL'
      CREATE DATABASE permissions_api_l2a;
      CREATE DATABASE permissions_api_l2b;
      CREATE DATABASE permissions_api_l2c;
      CREATE DATABASE prividium_block_explorer_l2a;
      CREATE DATABASE prividium_block_explorer_l2b;
      CREATE DATABASE prividium_block_explorer_l2c;
      SQL

      exec docker-entrypoint.sh postgres
      "

  l1:
    image: ghcr.io/foundry-rs/foundry:v1.5.1
    platform: linux/amd64
    volumes:
      - ./chain-configs/dev/zksyncos/l1-state-3chains.json.gz:/zkos-l1-state.json.gz:ro
      - l1state:/home/foundry/l1state
    entrypoint: ""
    user: root
    ports:
      - 5010:5010
    healthcheck:
      test: ["CMD-SHELL", "cast chain-id -r http://localhost:5010"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: |
      bash -c "
      gzip -dc /zkos-l1-state.json.gz > /home/foundry/l1state/state-v31.json;
      anvil --version
      anvil --state=/home/foundry/l1state/state-v31.json --port 5010 --host 0.0.0.0
      "

  fund-l1-senders:
    image: ghcr.io/foundry-rs/foundry:v1.5.1
    platform: linux/amd64
    entrypoint: ""
    depends_on:
      l1:
        condition: service_healthy
    command: >-
      bash -c "
      set -euo pipefail &&
      RPC_URL=http://l1:5010 &&
      for SENDER_ADDRESS in 0x0E8b6302404446775a263A8cCAAbB2692fe24a73 0x574141bF5deCA94F71acad4aaC0662c27bC6D85a 0xE8242c8C8B3D325624122F54B8963C9979fbF8dA 0xD667a272ad926a19dA6E02e4449E0488d646d91A 0x6Fe5f451e5Deb68CB4f7f2Ac1A38E027f9D65f90 0xF67c256463BeCB4351f0999eC404BbA9D7B53dfd 0xEc1B8631492394bdf1972dCcC520eA9129843DF6 0x919330e38d59f9920FcB9CdE995c93034381A3C0 0x764226932Bb7E0EFC8a2E7d4c3067F05e4fF2f54; do
        printf '[\"%s\",\"0x56BC75E2D63100000\"]' $$SENDER_ADDRESS | cast rpc --rpc-url $$RPC_URL --raw anvil_setBalance >/dev/null &&
        echo \"Funded L1 sender $$SENDER_ADDRESS\";
      done &&
      for SENDER_ADDRESS in 0x0E8b6302404446775a263A8cCAAbB2692fe24a73 0x574141bF5deCA94F71acad4aaC0662c27bC6D85a 0xE8242c8C8B3D325624122F54B8963C9979fbF8dA 0xD667a272ad926a19dA6E02e4449E0488d646d91A 0x6Fe5f451e5Deb68CB4f7f2Ac1A38E027f9D65f90 0xF67c256463BeCB4351f0999eC404BbA9D7B53dfd 0xEc1B8631492394bdf1972dCcC520eA9129843DF6 0x919330e38d59f9920FcB9CdE995c93034381A3C0 0x764226932Bb7E0EFC8a2E7d4c3067F05e4fF2f54; do
        cast balance --rpc-url $$RPC_URL $$SENDER_ADDRESS;
      done
      "
    restart: "no"

  zksyncos-l2a:
    image: ghcr.io/matter-labs/zksync-os-server:v0.15.1
    platform: linux/amd64
    user: root
    working_dir: /app
    entrypoint: ""
    command: ["/usr/bin/tini", "--", "zksync-os-server", "--config", "/app/chain-configs/chain_6565.yaml"]
    ports:
      - 5050:3050
    environment:
      GENERAL_L1_RPC_URL: http://l1:5010
    volumes:
      - ./chain-configs/dev/zksyncos:/app/chain-configs:ro
      - ../zksync-os-server/local-chains/v31.0/genesis.json:/app/local-chains/v31.0/genesis.json:ro
      - zksyncos_db_v31_l2a:/app/db
    depends_on:
      l1:
        condition: service_healthy
      fund-l1-senders:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/3050"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  zksyncos-l2b:
    image: ghcr.io/matter-labs/zksync-os-server:v0.15.1
    platform: linux/amd64
    user: root
    working_dir: /app
    entrypoint: ""
    command: ["/usr/bin/tini", "--", "zksync-os-server", "--config", "/app/chain-configs/chain_6566.yaml"]
    ports:
      - 5051:3050
    environment:
      GENERAL_L1_RPC_URL: http://l1:5010
    volumes:
      - ./chain-configs/dev/zksyncos:/app/chain-configs:ro
      - ../zksync-os-server/local-chains/v31.0/genesis.json:/app/local-chains/v31.0/genesis.json:ro
      - zksyncos_db_v31_l2b:/app/db
    depends_on:
      l1:
        condition: service_healthy
      fund-l1-senders:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/3050"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  zksyncos-l2c:
    image: ghcr.io/matter-labs/zksync-os-server:v0.15.1
    platform: linux/amd64
    user: root
    working_dir: /app
    entrypoint: ""
    command: ["/usr/bin/tini", "--", "zksync-os-server", "--config", "/app/chain-configs/chain_6567.yaml"]
    ports:
      - 5052:3050
    environment:
      GENERAL_L1_RPC_URL: http://l1:5010
    volumes:
      - ./chain-configs/dev/zksyncos:/app/chain-configs:ro
      - ../zksync-os-server/local-chains/v31.0/genesis.json:/app/local-chains/v31.0/genesis.json:ro
      - zksyncos_db_v31_l2c:/app/db
    depends_on:
      l1:
        condition: service_healthy
      fund-l1-senders:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/3050"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  wait-for-chains:
    image: ghcr.io/jackhamer09/prividium-setup-tools:latest
    platform: linux/amd64
    command: >-
      bash -c "
      echo 'Waiting for zksyncos-l2a...' &&
      until curl -sf -X POST -H 'Content-Type: application/json' --data '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' http://zksyncos-l2a:3050 >/dev/null 2>&1; do sleep 2; done &&
      echo 'Waiting for zksyncos-l2b...' &&
      until curl -sf -X POST -H 'Content-Type: application/json' --data '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' http://zksyncos-l2b:3050 >/dev/null 2>&1; do sleep 2; done &&
      echo 'Waiting for zksyncos-l2c...' &&
      until curl -sf -X POST -H 'Content-Type: application/json' --data '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' http://zksyncos-l2c:3050 >/dev/null 2>&1; do sleep 2; done &&
      echo 'All L2 chains are ready.'
      "
    depends_on:
      zksyncos-l2a:
        condition: service_healthy
      zksyncos-l2b:
        condition: service_healthy
      zksyncos-l2c:
        condition: service_healthy
    restart: "no"

  interop-relay:
    image: ghcr.io/jackhamer09/cast-interop:latest
    platform: linux/amd64
    restart: unless-stopped
    environment:
      RELAY_PRIVATE_KEY: "0x7726827caac94a7f9e1b160f7ea819f172f7b6f9d2a97f992c38edeab82d4110"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        cast-interop auto-relay
        --rpc http://zksyncos-l2a:3050
        --rpc http://zksyncos-l2b:3050
        --rpc http://zksyncos-l2c:3050
        --private-key $$RELAY_PRIVATE_KEY
    depends_on:
      wait-for-chains:
        condition: service_completed_successfully

  deposit-l1-to-l2:
    image: ghcr.io/jackhamer09/prividium-setup-tools:latest
    platform: linux/amd64
    environment:
      <<: *setup-env
    command: >-
      bash -c "
      set -e &&
      echo 'Depositing ETH to L2A/L2B/L2C for deployer...' &&
      ./scripts/deposit.sh $$DEPLOYER_ADDRESS $$DEPOSIT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://l1:5010 http://zksyncos-l2a:3050 &&
      ./scripts/deposit.sh $$DEPLOYER_ADDRESS $$DEPOSIT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://l1:5010 http://zksyncos-l2b:3050 &&
      ./scripts/deposit.sh $$DEPLOYER_ADDRESS $$DEPOSIT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://l1:5010 http://zksyncos-l2c:3050
      "
    depends_on:
      wait-for-chains:
        condition: service_completed_successfully
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    ports:
      - 5080:8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: /
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_URL: http://localhost:5080
      KC_HOSTNAME_ADMIN_URL: http://localhost:5080
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./dev/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: 127.0.0.1:8080\\r\\nConnection: close\\r\\n\\r\\n' >&3"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  prometheus:
    image: prom/prometheus:v2.48.0
    restart: unless-stopped
    ports:
      - 9090:9090
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./dev/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --storage.tsdb.retention.time=200h
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:10.2.0
    restart: unless-stopped
    ports:
      - 3100:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dev/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3100
    depends_on:
      - prometheus

  permissions-api-l2a:
    image: quay.io/matterlabs_enterprise/prividium-permissions-api:v1.130.1
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      wait-for-chains:
        condition: service_completed_successfully
    ports:
      - 8000:8000
      - 9091:9091
    environment:
      <<: *permissions-api-env
      SEQUENCER_RPC_URL: http://zksyncos-l2a:3050
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3004
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/permissions_api_l2a
      SIWE_CHAIN_ID: 6565
      SIWE_VALID_DOMAINS: localhost:3000,localhost:3001,localhost:3004
      ADMIN_PANEL_REDIRECT_URLS: http://localhost:3000/callback
      BLOCK_EXPLORER_REDIRECT_URLS: http://localhost:3010/auth/callback
      WEBAUTHN_ORIGIN: http://localhost:3001

  user-panel-l2a:
    image: quay.io/matterlabs_enterprise/prividium-user-panel:v1.130.1
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - permissions-api-l2a
    ports:
      - 3001:3000
    environment:
      <<: *user-panel-env
      VITE_CHAIN_ID: 6565
      VITE_CHAIN_NAME: Prividium L2A
      VITE_OIDC_REDIRECT_URI: http://localhost:3001/callback
      VITE_OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3001/login
      VITE_ADMIN_PANEL_REDIRECT_URI: http://localhost:3000/callback
      VITE_PRIVIDIUM_API_URL: http://localhost:8000
      VITE_EXPLORER_URL: http://localhost:3010
      VITE_ADMIN_PANEL_URL: http://localhost:3000

  admin-panel-l2a:
    image: quay.io/matterlabs_enterprise/prividium-adminv2:v1.130.1
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - permissions-api-l2a
      - user-panel-l2a
    ports:
      - 3000:3000
    environment:
      PORT: 3000
      VITE_PRIVIDIUM_API_URL: http://localhost:8000
      VITE_USER_PANEL_URL: http://localhost:3001
      VITE_EXPLORER_URL: http://localhost:3010

  block-explorer-api-l2a:
    image: ghcr.io/matter-labs/block-explorer-api:latest
    platform: linux/amd64
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      postgres:
        condition: service_healthy
      wait-for-chains:
        condition: service_completed_successfully
      permissions-api-l2a:
        condition: service_started
    ports:
      - 3002:3000
    environment:
      <<: *block-explorer-api-env
      DATABASE_NAME: prividium_block_explorer_l2a
      PRIVIDIUM_APP_URL: http://localhost:3010
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2a:8000

  block-explorer-app-l2a:
    image: ghcr.io/matter-labs/block-explorer-app:latest
    platform: linux/amd64
    depends_on:
      - block-explorer-api-l2a
    ports:
      - 3010:3010
    volumes:
      - ./dev/block-explorer/block-explorer-config.js:/usr/src/app/packages/app/dist/config.js:ro

  block-explorer-data-fetcher-l2a:
    image: ghcr.io/matter-labs/block-explorer-data-fetcher:latest
    platform: linux/amd64
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      wait-for-chains:
        condition: service_completed_successfully
    ports:
      - 3040:3040
    environment:
      <<: *block-explorer-data-fetcher-env
      BLOCKCHAIN_RPC_URL: http://zksyncos-l2a:3050
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2a:8000/api

  block-explorer-worker-l2a:
    image: ghcr.io/matter-labs/block-explorer-worker:latest
    platform: linux/amd64
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      postgres:
        condition: service_healthy
      block-explorer-data-fetcher-l2a:
        condition: service_started
      wait-for-chains:
        condition: service_completed_successfully
    environment:
      <<: *block-explorer-worker-env
      DATABASE_NAME: prividium_block_explorer_l2a
      BLOCKCHAIN_RPC_URL: http://zksyncos-l2a:3050
      DATA_FETCHER_URL: http://block-explorer-data-fetcher-l2a:3040
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2a:8000/api

  permissions-api-l2b:
    image: quay.io/matterlabs_enterprise/prividium-permissions-api:v1.130.1
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      wait-for-chains:
        condition: service_completed_successfully
    ports:
      - 8300:8000
      - 9391:9091
    environment:
      <<: *permissions-api-env
      SEQUENCER_RPC_URL: http://zksyncos-l2b:3050
      CORS_ORIGIN: http://localhost:3300,http://localhost:3301,http://localhost:3302,http://localhost:3004
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/permissions_api_l2b
      SIWE_CHAIN_ID: 6566
      SIWE_VALID_DOMAINS: localhost:3300,localhost:3301,localhost:3004
      ADMIN_PANEL_REDIRECT_URLS: http://localhost:3300/callback
      BLOCK_EXPLORER_REDIRECT_URLS: http://localhost:3310/auth/callback
      WEBAUTHN_ORIGIN: http://localhost:3301

  user-panel-l2b:
    image: quay.io/matterlabs_enterprise/prividium-user-panel:v1.130.1
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - permissions-api-l2b
    ports:
      - 3301:3000
    environment:
      <<: *user-panel-env
      VITE_CHAIN_ID: 6566
      VITE_CHAIN_NAME: Prividium L2B
      VITE_OIDC_REDIRECT_URI: http://localhost:3301/callback
      VITE_OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3301/login
      VITE_ADMIN_PANEL_REDIRECT_URI: http://localhost:3300/callback
      VITE_PRIVIDIUM_API_URL: http://localhost:8300
      VITE_EXPLORER_URL: http://localhost:3310
      VITE_ADMIN_PANEL_URL: http://localhost:3300

  admin-panel-l2b:
    image: quay.io/matterlabs_enterprise/prividium-adminv2:v1.130.1
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - permissions-api-l2b
      - user-panel-l2b
    ports:
      - 3300:3000
    environment:
      PORT: 3000
      VITE_PRIVIDIUM_API_URL: http://localhost:8300
      VITE_USER_PANEL_URL: http://localhost:3301
      VITE_EXPLORER_URL: http://localhost:3310

  block-explorer-api-l2b:
    image: ghcr.io/matter-labs/block-explorer-api:latest
    platform: linux/amd64
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      postgres:
        condition: service_healthy
      wait-for-chains:
        condition: service_completed_successfully
      permissions-api-l2b:
        condition: service_started
    ports:
      - 3302:3000
    environment:
      <<: *block-explorer-api-env
      DATABASE_NAME: prividium_block_explorer_l2b
      PRIVIDIUM_APP_URL: http://localhost:3310
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2b:8000

  block-explorer-app-l2b:
    image: ghcr.io/matter-labs/block-explorer-app:latest
    platform: linux/amd64
    depends_on:
      - block-explorer-api-l2b
    ports:
      - 3310:3010
    volumes:
      - ./dev/block-explorer/block-explorer-config-b.js:/usr/src/app/packages/app/dist/config.js:ro

  block-explorer-data-fetcher-l2b:
    image: ghcr.io/matter-labs/block-explorer-data-fetcher:latest
    platform: linux/amd64
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      wait-for-chains:
        condition: service_completed_successfully
    ports:
      - 3340:3040
    environment:
      <<: *block-explorer-data-fetcher-env
      BLOCKCHAIN_RPC_URL: http://zksyncos-l2b:3050
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2b:8000/api

  block-explorer-worker-l2b:
    image: ghcr.io/matter-labs/block-explorer-worker:latest
    platform: linux/amd64
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      postgres:
        condition: service_healthy
      block-explorer-data-fetcher-l2b:
        condition: service_started
      wait-for-chains:
        condition: service_completed_successfully
    environment:
      <<: *block-explorer-worker-env
      DATABASE_NAME: prividium_block_explorer_l2b
      BLOCKCHAIN_RPC_URL: http://zksyncos-l2b:3050
      DATA_FETCHER_URL: http://block-explorer-data-fetcher-l2b:3040
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2b:8000/api

  permissions-api-l2c:
    image: quay.io/matterlabs_enterprise/prividium-permissions-api:v1.130.1
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      wait-for-chains:
        condition: service_completed_successfully
    ports:
      - 8600:8000
      - 9691:9091
    environment:
      <<: *permissions-api-env
      SEQUENCER_RPC_URL: http://zksyncos-l2c:3050
      CORS_ORIGIN: http://localhost:3600,http://localhost:3601,http://localhost:3602,http://localhost:3004
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/permissions_api_l2c
      SIWE_CHAIN_ID: 6567
      SIWE_VALID_DOMAINS: localhost:3600,localhost:3601,localhost:3004
      ADMIN_PANEL_REDIRECT_URLS: http://localhost:3600/callback
      BLOCK_EXPLORER_REDIRECT_URLS: http://localhost:3610/auth/callback
      WEBAUTHN_ORIGIN: http://localhost:3601

  user-panel-l2c:
    image: quay.io/matterlabs_enterprise/prividium-user-panel:v1.130.1
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - permissions-api-l2c
    ports:
      - 3601:3000
    environment:
      <<: *user-panel-env
      VITE_CHAIN_ID: 6567
      VITE_CHAIN_NAME: Prividium L2C
      VITE_OIDC_REDIRECT_URI: http://localhost:3601/callback
      VITE_OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3601/login
      VITE_ADMIN_PANEL_REDIRECT_URI: http://localhost:3600/callback
      VITE_PRIVIDIUM_API_URL: http://localhost:8600
      VITE_EXPLORER_URL: http://localhost:3610
      VITE_ADMIN_PANEL_URL: http://localhost:3600

  admin-panel-l2c:
    image: quay.io/matterlabs_enterprise/prividium-adminv2:v1.130.1
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - permissions-api-l2c
      - user-panel-l2c
    ports:
      - 3600:3000
    environment:
      PORT: 3000
      VITE_PRIVIDIUM_API_URL: http://localhost:8600
      VITE_USER_PANEL_URL: http://localhost:3601
      VITE_EXPLORER_URL: http://localhost:3610

  block-explorer-api-l2c:
    image: ghcr.io/matter-labs/block-explorer-api:latest
    platform: linux/amd64
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      postgres:
        condition: service_healthy
      wait-for-chains:
        condition: service_completed_successfully
      permissions-api-l2c:
        condition: service_started
    ports:
      - 3602:3000
    environment:
      <<: *block-explorer-api-env
      DATABASE_NAME: prividium_block_explorer_l2c
      PRIVIDIUM_APP_URL: http://localhost:3610
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2c:8000

  block-explorer-app-l2c:
    image: ghcr.io/matter-labs/block-explorer-app:latest
    platform: linux/amd64
    depends_on:
      - block-explorer-api-l2c
    ports:
      - 3610:3010
    volumes:
      - ./dev/block-explorer/block-explorer-config-c.js:/usr/src/app/packages/app/dist/config.js:ro

  block-explorer-data-fetcher-l2c:
    image: ghcr.io/matter-labs/block-explorer-data-fetcher:latest
    platform: linux/amd64
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      wait-for-chains:
        condition: service_completed_successfully
    ports:
      - 3640:3040
    environment:
      <<: *block-explorer-data-fetcher-env
      BLOCKCHAIN_RPC_URL: http://zksyncos-l2c:3050
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2c:8000/api

  block-explorer-worker-l2c:
    image: ghcr.io/matter-labs/block-explorer-worker:latest
    platform: linux/amd64
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      postgres:
        condition: service_healthy
      block-explorer-data-fetcher-l2c:
        condition: service_started
      wait-for-chains:
        condition: service_completed_successfully
    environment:
      <<: *block-explorer-worker-env
      DATABASE_NAME: prividium_block_explorer_l2c
      BLOCKCHAIN_RPC_URL: http://zksyncos-l2c:3050
      DATA_FETCHER_URL: http://block-explorer-data-fetcher-l2c:3040
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2c:8000/api

